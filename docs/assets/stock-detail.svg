<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="820" viewBox="0 0 1280 820" role="img" aria-labelledby="title desc">
  <title id="title">IDX Stock Screener stock detail page</title>
  <desc id="desc">Dark themed BBCA stock detail page with price, timeframe controls, chart area, and technical snapshot.</desc>
  <rect width="1280" height="820" fill="#07111f"/>
  <g font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
