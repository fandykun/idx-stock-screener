    <text x="70" y="142" fill="#2cc5ff" font-size="18" letter-spacing="6">FINANCIALS</text>
    <text x="70" y="214" fill="#d9e7f7" font-size="64" font-weight="800">BBCA · Bank Central Asia</text>
    <text x="70" y="274" fill="#ffffff" font-size="34" font-weight="800">Rp 10.323</text>
    <g transform="translate(70 320)">
      <rect width="56" height="38" rx="12" fill="#2f6df6"/><text x="17" y="25" fill="#fff" font-size="15">1W</text>
      <rect x="66" width="56" height="38" rx="12" fill="none" stroke="#23507f"/><text x="82" y="25" fill="#d9e7f7" font-size="15">1M</text>
      <rect x="132" width="56" height="38" rx="12" fill="none" stroke="#23507f"/><text x="148" y="25" fill="#d9e7f7" font-size="15">3M</text>
      <rect x="198" width="56" height="38" rx="12" fill="none" stroke="#23507f"/><text x="214" y="25" fill="#d9e7f7" font-size="15">6M</text>
      <rect x="264" width="56" height="38" rx="12" fill="none" stroke="#23507f"/><text x="281" y="25" fill="#d9e7f7" font-size="15">1Y</text>
      <text x="350" y="25" fill="#d9e7f7" font-size="16">☑ MA20</text>
      <text x="440" y="25" fill="#93a4b8" font-size="16">☐ MA50</text>
      <text x="530" y="25" fill="#93a4b8" font-size="16">☐ Bollinger</text>
    </g>
    <g transform="translate(70 390)">
      <rect width="790" height="340" rx="20" fill="#081526" stroke="#173d67"/>
      <g stroke="#173d67" opacity="0.7">
        <line x1="40" y1="70" x2="750" y2="70"/><line x1="40" y1="140" x2="750" y2="140"/><line x1="40" y1="210" x2="750" y2="210"/><line x1="40" y1="280" x2="750" y2="280"/>
      </g>
      <polyline points="42,230 105,214 168,224 231,178 294,186 357,143 420,156 483,122 546,132 609,98 672,106 748,76" fill="none" stroke="#2f6df6" stroke-width="4"/>
      <polyline points="42,250 105,236 168,232 231,210 294,198 357,182 420,170 483,154 546,142 609,130 672,118 748,106" fill="none" stroke="#f59e0b" stroke-width="3" opacity="0.85"/>
      <text x="540" y="318" fill="#7ea6d9" font-size="13">Charting by TradingView</text>
    </g>
    <g transform="translate(900 390)">
      <rect width="300" height="210" rx="20" fill="#081526" stroke="#173d67"/>
      <text x="24" y="46" fill="#e6f0ff" font-size="24" font-weight="800">Technical snapshot</text>
      <text x="24" y="92" fill="#d9e7f7" font-size="18">RSI: 69.4</text>
      <text x="24" y="128" fill="#d9e7f7" font-size="18">MACD: 74.34</text>
      <text x="24" y="164" fill="#d9e7f7" font-size="18">Signal: 59.10</text>
